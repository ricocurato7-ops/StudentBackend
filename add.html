<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link rel="stylesheet" href="index.css">
     <script src="index.js"></script>	
</head>
<body>
    <h2>Add Student Record</h2>

    <input type="text" id="name" placeholder="Student Name"><br>
    <input type="text" id="course" placeholder="Course"><br>
    <input type="text" id="year" placeholder="Year Level"><br>
    <input type="text" id="record" placeholder="ID number"><br>
    <input type="number" id="age" placeholder="Age"><br>
    <input type="text" id="parentName" placeholder="Parent/Guardian Name"><br>
    <input type="text" id="parentContact" placeholder="Parent Contact Number"><br>
    <button onclick="addStudent()">Save</button>
    <button onclick="goBack()">Back</button>


</body>
</html>
